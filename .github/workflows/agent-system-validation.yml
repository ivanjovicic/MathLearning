name: Backend Agent System Validation

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - ".ai/**"
      - "docs/AGENT_*.md"
      - "docs/DOCUMENTATION_SYSTEM.md"
      - "docs/DOCS_INDEX.md"
      - "docs/DOCS_MANIFEST.json"
      - "docs/DOCS_REGISTRY.md"
      - "docs/ai/**"
      - "docs/prompt_queues/**"
      - "scripts/agent_run.py"
      - "scripts/analyze_agent_runs.py"
      - "scripts/check_documentation_health.py"
      - "scripts/run_guarded.py"
      - "scripts/test_agent_*.py"
      - "scripts/test_analyze_agent_runs.py"
      - "scripts/test_check_documentation_health.py"
      - "scripts/validate_agent_*.py"
      - "scripts/test_validate_agent_*.py"
      - "scripts/ci/classify_backend_changes.py"
      - "scripts/ci/test_classify_backend_changes.py"
      - ".github/workflows/agent-system-validation.yml"
      - ".github/workflows/database-validation.yml"
  push:
    branches: [main]
    paths:
      - "AGENTS.md"
      - ".ai/**"
      - "docs/AGENT_*.md"
      - "docs/DOCUMENTATION_SYSTEM.md"
      - "docs/DOCS_INDEX.md"
      - "docs/DOCS_MANIFEST.json"
      - "docs/DOCS_REGISTRY.md"
      - "docs/ai/**"
      - "docs/prompt_queues/**"
      - "scripts/agent_run.py"
      - "scripts/analyze_agent_runs.py"
      - "scripts/check_documentation_health.py"
      - "scripts/run_guarded.py"
      - "scripts/test_agent_*.py"
      - "scripts/test_analyze_agent_runs.py"
      - "scripts/test_check_documentation_health.py"
      - "scripts/validate_agent_*.py"
      - "scripts/test_validate_agent_*.py"
      - "scripts/ci/classify_backend_changes.py"
      - "scripts/ci/test_classify_backend_changes.py"
      - ".github/workflows/agent-system-validation.yml"
      - ".github/workflows/database-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agent-system-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-agent-system:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile changed agent tooling
        run: >-
          python -m py_compile
          scripts/agent_run.py
          scripts/analyze_agent_runs.py
          scripts/check_documentation_health.py
          scripts/run_guarded.py
          scripts/validate_agent_prompt.py
          scripts/validate_agent_evidence.py
          scripts/validate_agent_system.py
          scripts/ci/classify_backend_changes.py

      - name: Run focused agent-system tests
        run: >-
          python -m unittest -v
          scripts/test_agent_run.py
          scripts/test_analyze_agent_runs.py
          scripts/test_check_documentation_health.py
          scripts/test_run_guarded.py
          scripts/test_validate_agent_prompt.py
          scripts/test_validate_agent_evidence.py
          scripts/test_validate_agent_system.py
          scripts/ci/test_classify_backend_changes.py

      - name: Validate documentation manifest and registry
        run: python scripts/check_documentation_health.py --full-links

      - name: Validate agent-system wiring
        run: python scripts/validate_agent_system.py

      - name: Resolve changed-range base
        id: base
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE: ${{ github.event.before }}
        run: |
          base="$PR_BASE"
          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then base="$PUSH_BASE"; fi
          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then base="HEAD^"; fi
          echo "sha=$base" >> "$GITHUB_OUTPUT"

      - name: Report documentation context for changed paths
        run: python scripts/check_documentation_health.py --changed-from "${{ steps.base.outputs.sha }}"

      - name: Validate changed prompt contracts
        run: python scripts/validate_agent_prompt.py --changed-from "${{ steps.base.outputs.sha }}"

      - name: Validate changed evidence only
        run: python scripts/validate_agent_evidence.py --changed-from "${{ steps.base.outputs.sha }}" --verify-git

      - name: Reject new agent-speed regressions
        run: python scripts/analyze_agent_runs.py --changed-from "${{ steps.base.outputs.sha }}" --fail-on-regression
