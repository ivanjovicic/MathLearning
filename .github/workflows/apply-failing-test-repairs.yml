name: Apply Failing Test Repairs

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-failing-test-repairs.yml

permissions:
  contents: write

jobs:
  patch-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Apply minimal repairs
        shell: python
        run: |
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8-sig")
              if old not in text:
                  raise RuntimeError(f"Expected block not found in {path}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace(
              "src/MathLearning.Admin/Services/AdminApiClient.cs",
              '''        if (Uri.TryCreate(requestUri, UriKind.Absolute, out _))
                  {
                      return;
                  }
          ''',
              '''        if (Uri.TryCreate(requestUri, UriKind.Absolute, out var absoluteUri) &&
                      (absoluteUri.Scheme == Uri.UriSchemeHttp || absoluteUri.Scheme == Uri.UriSchemeHttps))
                  {
                      return;
                  }
          ''')

          replace(
              "src/MathLearning.Application/Helpers/StepEngine.cs",
              '''        // Try simple linear equation: "x + B = C" or "Ax = C"
                  var eqMatch1 = Regex.Match(text, @"x\\s*\\+\\s*(\\d+)\\s*=\\s*(\\d+)");
                  if (eqMatch1.Success)
                  {
                      int b = int.Parse(eqMatch1.Groups[1].Value);
                      int c = int.Parse(eqMatch1.Groups[2].Value);
                      return isSr ? ForLinearAddSr(b, c) : ForLinearAddEn(b, c);
                  }
          
                  var eqMatch2 = Regex.Match(text, @"(\\d+)x\\s*=\\s*(\\d+)");
                  if (eqMatch2.Success)
                  {
                      int a = int.Parse(eqMatch2.Groups[1].Value);
                      int c = int.Parse(eqMatch2.Groups[2].Value);
                      return isSr ? ForLinearMulSr(a, c) : ForLinearMulEn(a, c);
                  }
          
                  // Try "Ax - B = C" or "Ax + B = C"
                  var eqMatch3 = Regex.Match(text, @"(\\d+)x\\s*([\\+\\-−])\\s*(\\d+)\\s*=\\s*(\\d+)");
                  if (eqMatch3.Success)
                  {
                      int a = int.Parse(eqMatch3.Groups[1].Value);
                      string op = eqMatch3.Groups[2].Value;
                      int b = int.Parse(eqMatch3.Groups[3].Value);
                      int c = int.Parse(eqMatch3.Groups[4].Value);
                      bool isSubtract = op == "-" || op == "−";
                      return isSr ? ForLinearComplexSr(a, b, c, isSubtract) : ForLinearComplexEn(a, b, c, isSubtract);
                  }
          ''',
              '''        // Try "Ax - B = C" or "Ax + B = C" before the simpler x + B form.
                  // Otherwise "2x + 4 = 18" is partially matched as "x + 4 = 18".
                  var eqMatch3 = Regex.Match(text, @"(\\d+)x\\s*([\\+\\-−])\\s*(\\d+)\\s*=\\s*(\\d+)");
                  if (eqMatch3.Success)
                  {
                      int a = int.Parse(eqMatch3.Groups[1].Value);
                      string op = eqMatch3.Groups[2].Value;
                      int b = int.Parse(eqMatch3.Groups[3].Value);
                      int c = int.Parse(eqMatch3.Groups[4].Value);
                      bool isSubtract = op == "-" || op == "−";
                      return isSr ? ForLinearComplexSr(a, b, c, isSubtract) : ForLinearComplexEn(a, b, c, isSubtract);
                  }
          
                  // Try simple linear equation: "x + B = C" or "Ax = C"
                  var eqMatch1 = Regex.Match(text, @"x\\s*\\+\\s*(\\d+)\\s*=\\s*(\\d+)");
                  if (eqMatch1.Success)
                  {
                      int b = int.Parse(eqMatch1.Groups[1].Value);
                      int c = int.Parse(eqMatch1.Groups[2].Value);
                      return isSr ? ForLinearAddSr(b, c) : ForLinearAddEn(b, c);
                  }
          
                  var eqMatch2 = Regex.Match(text, @"(\\d+)x\\s*=\\s*(\\d+)");
                  if (eqMatch2.Success)
                  {
                      int a = int.Parse(eqMatch2.Groups[1].Value);
                      int c = int.Parse(eqMatch2.Groups[2].Value);
                      return isSr ? ForLinearMulSr(a, c) : ForLinearMulEn(a, c);
                  }
          ''')

          replace(
              "src/MathLearning.Infrastructure/Persistance/ApiDbContext.cs",
              '''            entity.Property(e => e.NextReview).HasDefaultValueSql("NOW() AT TIME ZONE 'UTC'");
          ''',
              '''            var nextReview = entity.Property(e => e.NextReview);
                  var nextReviewDefaultSql = string.Equals(
                      Database.ProviderName,
                      "Microsoft.EntityFrameworkCore.Sqlite",
                      StringComparison.Ordinal)
                      ? "CURRENT_TIMESTAMP"
                      : "NOW() AT TIME ZONE 'UTC'";
                  nextReview.HasDefaultValueSql(nextReviewDefaultSql);
          ''')

          replace(
              "tests/MathLearning.Tests/Endpoints/AnalyticsEndpointContractTests.cs",
              '''using MathLearning.Api;
          ''',
              '''using MathLearning.Api;
          using MathLearning.Api.Middleware;
          ''')
          replace(
              "tests/MathLearning.Tests/Endpoints/AnalyticsEndpointContractTests.cs",
              '''        Assert.Equal("An unexpected error occurred.", json.RootElement.GetProperty("error").GetString());
          ''',
              '''        Assert.Equal(
                      SafeClientErrorResponse.GenericInternalError,
                      json.RootElement.GetProperty("error").GetString());
          ''')

          replace(
              "tests/MathLearning.Tests/Endpoints/ExplanationEndpointContractTests.cs",
              '''using MathLearning.Api;
          ''',
              '''using MathLearning.Api;
          using MathLearning.Api.Middleware;
          ''')
          replace(
              "tests/MathLearning.Tests/Endpoints/ExplanationEndpointContractTests.cs",
              '''        Assert.Equal("An unexpected error occurred.", json.RootElement.GetProperty("error").GetString());
          ''',
              '''        Assert.Equal(
                      SafeClientErrorResponse.GenericInternalError,
                      json.RootElement.GetProperty("error").GetString());
          ''')

          replace(
              "tests/MathLearning.Tests/Endpoints/IdempotencyObservabilityAuthorizationTests.cs",
              '''        var endpoint = Assert.Single(dataSource.Endpoints
                      .OfType<RouteEndpoint>()
                      .Where(candidate => string.Equals(
                          candidate.RoutePattern.RawText,
                          Path,
                          StringComparison.OrdinalIgnoreCase)));
          ''',
              '''        var endpoint = Assert.Single(dataSource.Endpoints
                      .OfType<RouteEndpoint>()
                      .Where(candidate => string.Equals(
                          candidate.RoutePattern.RawText?.TrimEnd('/'),
                          Path,
                          StringComparison.OrdinalIgnoreCase)));
          ''')

      - name: Restore
        run: dotnet restore MathLearning.slnx

      - name: Release build
        run: dotnet build MathLearning.slnx -c Release --no-restore

      - name: Run repaired failure groups
        run: >-
          dotnet test tests/MathLearning.Tests/MathLearning.Tests.csproj
          -c Release --no-build
          --filter "FullyQualifiedName~AdminApiClientTests|FullyQualifiedName~AnalyticsEndpointContractTests|FullyQualifiedName~ExplanationEndpointContractTests|FullyQualifiedName~IdempotencyObservabilityAuthorizationTests|FullyQualifiedName~StepEngineTests|FullyQualifiedName~ApiDbTransactionHelpersRelationalTests|FullyQualifiedName~RelationalIdempotencyConstraintTests|FullyQualifiedName~RelationalIdempotencyTransactionTests|FullyQualifiedName~AuthRefreshRelationalConcurrencyTests|FullyQualifiedName~AuthMobileRegistrationRelationalAtomicityTests|FullyQualifiedName~OfflineBatchRelationalAtomicityTests|FullyQualifiedName~QuizAttemptIngestServiceRelationalTests|FullyQualifiedName~XpTrackingConcurrencyIntegrationTests"

      - name: Run full suite
        run: >-
          dotnet test tests/MathLearning.Tests/MathLearning.Tests.csproj
          -c Release --no-build
          --logger "trx;LogFileName=mathlearning-tests.trx"
          --results-directory artifacts/test-results

      - name: Commit validated repairs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/MathLearning.Admin/Services/AdminApiClient.cs \
            src/MathLearning.Application/Helpers/StepEngine.cs \
            src/MathLearning.Infrastructure/Persistance/ApiDbContext.cs \
            tests/MathLearning.Tests/Endpoints/AnalyticsEndpointContractTests.cs \
            tests/MathLearning.Tests/Endpoints/ExplanationEndpointContractTests.cs \
            tests/MathLearning.Tests/Endpoints/IdempotencyObservabilityAuthorizationTests.cs
          git commit -m "fix(test): repair failing backend suites"
          git push origin HEAD:agent/fix-failing-tests-2026-07-11
