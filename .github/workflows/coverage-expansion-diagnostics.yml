name: Coverage Expansion Diagnostics

on:
  pull_request:
    paths:
      - "tests/**"
      - "src/**"
      - "scripts/db/**"
      - ".github/workflows/coverage-expansion-diagnostics.yml"

jobs:
  coverage-diagnostics:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install tools
        run: |
          dotnet tool install --global dotnet-ef
          dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Restore
        run: dotnet restore MathLearning.slnx

      - name: Capture build output
        id: build
        shell: bash
        run: |
          mkdir -p artifacts/build-diagnostics artifacts/schema-diagnostics artifacts/test-results artifacts/coverage-report
          set +e
          dotnet build MathLearning.slnx -c Release --no-restore > artifacts/build-diagnostics/build.log 2>&1
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          cat artifacts/build-diagnostics/build.log
          exit 0

      - name: Capture schema-from-zero output
        id: schema
        if: steps.build.outputs.exit_code == '0'
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          ./scripts/db/validate-schema.ps1 `
            -ConnectionString "Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=mathlearning_ci_template;Pooling=true;" `
            -DatabaseName "mathlearning_ci_diagnostics" `
            -KeepDatabase *> artifacts/schema-diagnostics/schema.log
          $exitCode = $LASTEXITCODE
          "exit_code=$exitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Get-Content artifacts/schema-diagnostics/schema.log
          exit 0

      - name: Run complete test suite with coverage
        id: tests
        if: always() && steps.build.outputs.exit_code == '0'
        shell: bash
        run: |
          set +e
          dotnet test tests/MathLearning.Tests/MathLearning.Tests.csproj \
            -c Release \
            --no-build \
            --logger "trx;LogFileName=mathlearning-tests.trx" \
            --results-directory artifacts/test-results \
            --collect:"XPlat Code Coverage" \
            --settings tests/MathLearning.Tests/coverage.runsettings \
            > artifacts/test-results/test.log 2>&1
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          cat artifacts/test-results/test.log
          exit 0

      - name: Generate coverage report
        if: always() && steps.tests.outcome != 'skipped'
        shell: bash
        run: |
          COVERAGE_FILES=$(find artifacts/test-results -type f -name 'coverage.cobertura.xml' -print | paste -sd ';' -)
          if [ -n "$COVERAGE_FILES" ]; then
            reportgenerator \
              "-reports:$COVERAGE_FILES" \
              "-targetdir:artifacts/coverage-report" \
              "-reporttypes:Html;Cobertura;MarkdownSummaryGithub"
            if [ -f artifacts/coverage-report/SummaryGithub.md ]; then
              cat artifacts/coverage-report/SummaryGithub.md
            fi
          fi

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-expansion-diagnostics
          path: |
            artifacts/build-diagnostics
            artifacts/schema-diagnostics
            artifacts/test-results
            artifacts/coverage-report
          if-no-files-found: error
          retention-days: 3

      - name: Fail when build or tests failed
        if: steps.build.outputs.exit_code != '0' || steps.tests.outputs.exit_code != '0'
        run: exit 1
