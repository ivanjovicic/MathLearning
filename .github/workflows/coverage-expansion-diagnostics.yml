name: Coverage Expansion Diagnostics

on:
  pull_request:
    paths:
      - "tests/**"
      - "src/**"
      - ".github/workflows/coverage-expansion-diagnostics.yml"

jobs:
  build-diagnostics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore MathLearning.slnx

      - name: Capture build output
        id: build
        shell: bash
        run: |
          mkdir -p artifacts/build-diagnostics
          set +e
          dotnet build MathLearning.slnx -c Release --no-restore > artifacts/build-diagnostics/build.log 2>&1
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          cat artifacts/build-diagnostics/build.log
          exit 0

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-expansion-build-log
          path: artifacts/build-diagnostics/build.log
          if-no-files-found: error
          retention-days: 3

      - name: Fail when build failed
        if: steps.build.outputs.exit_code != '0'
        run: exit 1
