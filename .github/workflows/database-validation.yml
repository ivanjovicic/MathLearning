name: Database Validation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_full_suite:
        description: Run the full .NET/PostgreSQL suite even when changed paths are docs/tooling only
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: database-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  classify-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      database_validation: ${{ steps.classify.outputs.database_validation }}
      reason: ${{ steps.classify.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Classify validation scope
        id: classify
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          FORCE_FULL: ${{ inputs.force_full_suite }}
        run: |
          base="$PR_BASE"
          if [[ -z "$base" ]]; then base="$PUSH_BASE"; fi
          args=(--base "$base" --head "$HEAD_SHA" --github-output "$GITHUB_OUTPUT")
          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$FORCE_FULL" == "true" ]]; then
            args+=(--force)
          fi
          python scripts/ci/classify_backend_changes.py "${args[@]}"

      - name: Report scope decision
        run: |
          echo "## Database validation scope" >> "$GITHUB_STEP_SUMMARY"
          echo "- Full suite: ${{ steps.classify.outputs.database_validation }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Reason: ${{ steps.classify.outputs.reason }}" >> "$GITHUB_STEP_SUMMARY"

  database-suite:
    if: needs.classify-changes.outputs.database_validation == 'true'
    needs: classify-changes
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: dotnet restore MathLearning.slnx

      - name: Build
        run: dotnet build MathLearning.slnx -c Release --no-restore

      - name: Validate schema from zero
        shell: pwsh
        run: |
          ./scripts/db/validate-schema.ps1 `
            -ConnectionString "Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=mathlearning_ci_template;Pooling=true;" `
            -DatabaseName "mathlearning_ci_validation" `
            -KeepDatabase

      - name: Run test suite with coverage
        env:
          POSTGRES_PROVIDER_TESTS_REQUIRED: 1
          TEST_POSTGRES_MAINTENANCE_CONNECTION_STRING: Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=postgres;Pooling=true;
        run: >-
          dotnet test tests/MathLearning.Tests/MathLearning.Tests.csproj
          -c Release
          --no-build
          --logger "trx;LogFileName=mathlearning-tests.trx"
          --results-directory artifacts/test-results
          --collect:"XPlat Code Coverage"
          --settings tests/MathLearning.Tests/coverage.runsettings

      - name: Install ReportGenerator
        if: always()
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage summary
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/coverage-report
          COVERAGE_FILES=$(find artifacts/test-results -type f -name 'coverage.cobertura.xml' -print | paste -sd ';' -)
          if [ -z "$COVERAGE_FILES" ]; then
            echo "## Backend test coverage" >> "$GITHUB_STEP_SUMMARY"
            echo "No Cobertura coverage file was produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          reportgenerator \
            "-reports:$COVERAGE_FILES" \
            "-targetdir:artifacts/coverage-report" \
            "-reporttypes:Html;Cobertura;MarkdownSummaryGithub"
          if [ -f artifacts/coverage-report/SummaryGithub.md ]; then
            cat artifacts/coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mathlearning-test-results
          path: |
            artifacts/test-results
            artifacts/coverage-report
          if-no-files-found: warn
          retention-days: 14

      - name: Generate idempotent artifact
        run: |
          mkdir -p artifacts/migrations
          dotnet ef migrations script --idempotent \
            --project src/MathLearning.Infrastructure/MathLearning.Infrastructure.csproj \
            --startup-project src/MathLearning.Api/MathLearning.Api.csproj \
            --context ApiDbContext \
            --output artifacts/migrations/api-idempotent.sql

      - name: Smoke startup schema guard
        env:
          ASPNETCORE_ENVIRONMENT: CI
          ConnectionStrings__Default: Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=mathlearning_ci_validation;Pooling=true;
        run: |
          dotnet run --project src/MathLearning.Api/MathLearning.Api.csproj -c Release --no-build --urls http://127.0.0.1:5087 > api.log 2>&1 &
          API_PID=$!
          trap "kill $API_PID || true" EXIT
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5087/api/health/ready; then exit 0; fi
            sleep 2
          done
          cat api.log
          exit 1

      - name: Upload migration artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-idempotent-migration-script
          path: artifacts/migrations/api-idempotent.sql

  validate-database:
    if: always()
    needs: [classify-changes, database-suite]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Preserve stable validation result
        shell: bash
        env:
          REQUIRED: ${{ needs.classify-changes.outputs.database_validation }}
          REASON: ${{ needs.classify-changes.outputs.reason }}
          CLASSIFY_RESULT: ${{ needs.classify-changes.result }}
          SUITE_RESULT: ${{ needs.database-suite.result }}
        run: |
          echo "Database validation required: $REQUIRED"
          echo "Reason: $REASON"
          echo "Classifier: $CLASSIFY_RESULT"
          echo "Suite: $SUITE_RESULT"
          if [[ "$CLASSIFY_RESULT" != "success" ]]; then exit 1; fi
          if [[ "$REQUIRED" == "true" && "$SUITE_RESULT" != "success" ]]; then exit 1; fi
          if [[ "$REQUIRED" != "true" && "$SUITE_RESULT" != "skipped" ]]; then exit 1; fi
