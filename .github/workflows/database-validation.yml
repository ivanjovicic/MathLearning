name: Database Validation

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  validate-database:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: dotnet restore MathLearning.slnx

      - name: Build
        id: build
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/build
          dotnet build MathLearning.slnx -c Release --no-restore 2>&1 | tee artifacts/build/build.log

      - name: Validate schema from zero
        id: schema_validation
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/schema | Out-Null
          Start-Transcript -Path artifacts/schema/schema-validation.log -Force
          try {
            ./scripts/db/validate-schema.ps1 `
              -ConnectionString "Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=mathlearning_ci_template;Pooling=true;" `
              -DatabaseName "mathlearning_ci_validation" `
              -KeepDatabase
          }
          finally {
            Stop-Transcript
          }

      - name: Run test suite with coverage
        id: test_suite
        continue-on-error: true
        run: >-
          dotnet test tests/MathLearning.Tests/MathLearning.Tests.csproj
          -c Release
          --no-build
          --logger "trx;LogFileName=mathlearning-tests.trx"
          --results-directory artifacts/test-results
          --collect:"XPlat Code Coverage"
          --settings tests/MathLearning.Tests/coverage.runsettings

      - name: Upload build, schema, test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mathlearning-validation-results
          path: |
            artifacts/build
            artifacts/schema
            artifacts/test-results
          if-no-files-found: warn
          retention-days: 14

      - name: Generate idempotent artifact
        id: migration_artifact
        continue-on-error: true
        run: |
          mkdir -p artifacts/migrations
          dotnet ef migrations script --idempotent \
            --project src/MathLearning.Infrastructure/MathLearning.Infrastructure.csproj \
            --startup-project src/MathLearning.Api/MathLearning.Api.csproj \
            --context ApiDbContext \
            --output artifacts/migrations/api-idempotent.sql

      - name: Smoke startup schema guard
        id: startup_smoke
        if: steps.schema_validation.outcome == 'success'
        continue-on-error: true
        env:
          ASPNETCORE_ENVIRONMENT: CI
          ConnectionStrings__Default: Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=mathlearning_ci_validation;Pooling=true;
        run: |
          dotnet run --project src/MathLearning.Api/MathLearning.Api.csproj -c Release --no-build --urls http://127.0.0.1:5087 > api.log 2>&1 &
          API_PID=$!
          trap "kill $API_PID || true" EXIT
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5087/api/health/ready; then
              exit 0
            fi
            sleep 2
          done
          cat api.log
          exit 1

      - name: Upload migration artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-idempotent-migration-script
          path: artifacts/migrations/api-idempotent.sql
          if-no-files-found: warn

      - name: Enforce validation gates
        if: always()
        shell: bash
        run: |
          failed=0

          if [ "${{ steps.schema_validation.outcome }}" != "success" ]; then
            echo "Schema validation failed."
            failed=1
          fi

          if [ "${{ steps.test_suite.outcome }}" != "success" ]; then
            echo "Test suite failed."
            failed=1
          fi

          if [ "${{ steps.migration_artifact.outcome }}" != "success" ]; then
            echo "Idempotent migration generation failed."
            failed=1
          fi

          if [ "${{ steps.schema_validation.outcome }}" = "success" ] && [ "${{ steps.startup_smoke.outcome }}" != "success" ]; then
            echo "Startup schema smoke failed."
            failed=1
          fi

          exit "$failed"
