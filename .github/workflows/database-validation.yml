name: Database Validation

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  validate-database:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: dotnet restore MathLearning.slnx

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/build
          dotnet build MathLearning.slnx -c Release --no-restore 2>&1 | tee artifacts/build/build.log
          touch artifacts/build/build.success

      - name: Validate schema from zero
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/schema | Out-Null
          Start-Transcript -Path artifacts/schema/schema-validation.log -Force
          try {
            ./scripts/db/validate-schema.ps1 `
              -ConnectionString "Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=mathlearning_ci_template;Pooling=true;" `
              -DatabaseName "mathlearning_ci_validation" `
              -KeepDatabase
            New-Item -ItemType File -Force -Path artifacts/schema/schema-validation.success | Out-Null
          }
          finally {
            Stop-Transcript
          }

      - name: Run test suite with coverage
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts/test-results
          dotnet test tests/MathLearning.Tests/MathLearning.Tests.csproj \
            -c Release \
            --no-build \
            --logger "trx;LogFileName=mathlearning-tests.trx" \
            --results-directory artifacts/test-results \
            --collect:"XPlat Code Coverage" \
            --settings tests/MathLearning.Tests/coverage.runsettings
          touch artifacts/test-results/test-suite.success

      - name: Generate idempotent artifact
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts/migrations
          dotnet ef migrations script --idempotent \
            --project src/MathLearning.Infrastructure/MathLearning.Infrastructure.csproj \
            --startup-project src/MathLearning.Api/MathLearning.Api.csproj \
            --context ApiDbContext \
            --output artifacts/migrations/api-idempotent.sql
          touch artifacts/migrations/migration-artifact.success

      - name: Smoke startup schema guard
        if: always()
        continue-on-error: true
        shell: bash
        env:
          ASPNETCORE_ENVIRONMENT: CI
          ConnectionStrings__Default: Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=mathlearning_ci_validation;Pooling=true;
        run: |
          mkdir -p artifacts/startup

          if [ ! -f artifacts/schema/schema-validation.success ]; then
            echo "Schema validation did not succeed; startup smoke cannot run." | tee artifacts/startup/startup-smoke.log
            exit 0
          fi

          dotnet run --project src/MathLearning.Api/MathLearning.Api.csproj -c Release --no-build --urls http://127.0.0.1:5087 > artifacts/startup/startup-smoke.log 2>&1 &
          API_PID=$!
          trap "kill $API_PID || true" EXIT

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5087/api/health/ready; then
              touch artifacts/startup/startup-smoke.success
              exit 0
            fi
            sleep 2
          done

          cat artifacts/startup/startup-smoke.log
          exit 1

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mathlearning-validation-results
          path: |
            artifacts/build
            artifacts/schema
            artifacts/test-results
            artifacts/migrations
            artifacts/startup
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce validation gates
        if: always()
        shell: bash
        run: |
          failed=0

          for marker in \
            artifacts/build/build.success \
            artifacts/schema/schema-validation.success \
            artifacts/test-results/test-suite.success \
            artifacts/migrations/migration-artifact.success \
            artifacts/startup/startup-smoke.success
          do
            if [ ! -f "$marker" ]; then
              echo "Missing required validation marker: $marker"
              failed=1
            fi
          done

          exit "$failed"
