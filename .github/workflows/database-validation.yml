name: Database Validation

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  validate-database:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: dotnet restore MathLearning.slnx

      - name: Build
        run: dotnet build MathLearning.slnx -c Release --no-restore

      - name: Validate schema from zero
        shell: pwsh
        run: |
          ./scripts/db/validate-schema.ps1 `
            -ConnectionString "Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=mathlearning_ci_template;Pooling=true;" `
            -DatabaseName "mathlearning_ci_validation" `
            -KeepDatabase

      - name: Run test suite with coverage
        run: >-
          dotnet test tests/MathLearning.Tests/MathLearning.Tests.csproj
          -c Release
          --no-build
          --logger "trx;LogFileName=mathlearning-tests.trx"
          --results-directory artifacts/test-results
          --collect:"XPlat Code Coverage"
          --settings tests/MathLearning.Tests/coverage.runsettings

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mathlearning-test-results
          path: artifacts/test-results
          if-no-files-found: warn
          retention-days: 14

      - name: Generate idempotent artifact
        run: |
          mkdir -p artifacts/migrations
          dotnet ef migrations script --idempotent \
            --project src/MathLearning.Infrastructure/MathLearning.Infrastructure.csproj \
            --startup-project src/MathLearning.Api/MathLearning.Api.csproj \
            --context ApiDbContext \
            --output artifacts/migrations/api-idempotent.sql

      - name: Smoke startup schema guard
        env:
          ASPNETCORE_ENVIRONMENT: CI
          ConnectionStrings__Default: Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=mathlearning_ci_validation;Pooling=true;
        run: |
          dotnet run --project src/MathLearning.Api/MathLearning.Api.csproj -c Release --no-build --urls http://127.0.0.1:5087 > api.log 2>&1 &
          API_PID=$!
          trap "kill $API_PID || true" EXIT
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5087/api/health/ready; then
              exit 0
            fi
            sleep 2
          done
          cat api.log
          exit 1

      - name: Upload migration artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-idempotent-migration-script
          path: artifacts/migrations/api-idempotent.sql
