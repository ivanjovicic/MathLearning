name: Deploy to Fly.io

on:
  workflow_dispatch:
    inputs:
      confirmDatabaseMigrated:
        description: Confirm that the reviewed API migration script has already been applied to the target database.
        required: true
        type: boolean

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:
      - name: Require migration confirmation
        if: ${{ inputs.confirmDatabaseMigrated != true }}
        run: |
          echo "Database migrations must be applied before application deploys."
          echo "Run the reviewed script generated by the database validation workflow, then re-run this workflow with confirmation enabled."
          exit 1

  deploy:
    needs: guard
    runs-on: ubuntu-latest
    concurrency: deploy-group

    steps:
      - uses: actions/checkout@v3

      - name: Ensure secret is set
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "ERROR: Repository secret 'FLY_API_TOKEN' is not set."
            echo "Add it in Settings -> Secrets -> Actions and retry."
            exit 1
          fi

      - name: Debug env
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Token preview: ${FLY_API_TOKEN:0:4}..."

      - name: Install Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only
