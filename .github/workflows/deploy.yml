name: Deploy to Fly.io

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Ensure secret is set
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "ERROR: Repository secret 'FLY_API_TOKEN' is not set."
            echo "Add it in Settings -> Secrets -> Actions and retry."
            exit 1
          fi

      - name: Debug env
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Token preview: ${FLY_API_TOKEN:0:4}..."

      - name: Install Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only
