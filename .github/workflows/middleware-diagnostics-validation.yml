name: Middleware Diagnostics Validation

on:
  pull_request:
    paths:
      - "src/MathLearning.Api/Middleware/**"
      - "tests/MathLearning.Tests/Middleware/**"
      - ".github/workflows/middleware-diagnostics-validation.yml"
  push:
    branches: [main]
    paths:
      - "src/MathLearning.Api/Middleware/**"
      - "tests/MathLearning.Tests/Middleware/**"
      - ".github/workflows/middleware-diagnostics-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: middleware-diagnostics-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  focused-middleware-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore MathLearning.slnx

      - name: Run correlation and safe-error tests
        run: >-
          dotnet test tests/MathLearning.Tests/MathLearning.Tests.csproj
          -c Release
          --no-restore
          --filter "FullyQualifiedName~CorrelationIdMiddlewareTests|FullyQualifiedName~GlobalExceptionMiddlewareTests|FullyQualifiedName~SafeClientErrorResponseTests"
          --logger "trx;LogFileName=middleware-diagnostics.trx"
          --results-directory artifacts/middleware-diagnostics

      - name: Upload focused test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: middleware-diagnostics-test-result
          path: artifacts/middleware-diagnostics
          if-no-files-found: warn
          retention-days: 7
