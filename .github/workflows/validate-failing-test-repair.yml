name: Validate Failing Test Repair

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/validate-failing-test-repair.yml"
      - ".ai/runs/2026-07-11-BACKEND-FAILING-TESTS-001-evidence.md"
      - "docs/prompt_queues/backend_failing_test_followups_2026_07_11.md"
      - "docs/prompt_queues/backend_test_coverage.md"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate current run evidence
        run: |
          python - <<'PY'
          from pathlib import Path
          from scripts.validate_agent_evidence import load_mistake_ids, validate_run_log

          path = Path('.ai/runs/2026-07-11-BACKEND-FAILING-TESTS-001-evidence.md').resolve()
          findings = validate_run_log(path, load_mistake_ids(), {path})
          failures = [finding for finding in findings if finding.severity == 'FAIL']
          warnings = [finding for finding in findings if finding.severity == 'WARN']

          print(f'Current run-log failures: {len(failures)}')
          print(f'Current run-log warnings: {len(warnings)}')
          for finding in findings:
              print('- ' + finding.format())

          if failures:
              raise SystemExit(1)
          PY

      - name: Capture repository-wide referenced evidence debt
        shell: bash
        run: |
          mkdir -p artifacts/evidence-lint
          set +e
          python scripts/validate_agent_evidence.py --referenced-run-logs-only \
            > artifacts/evidence-lint/output.log 2>&1
          exit_code=$?
          echo "Repository-wide referenced evidence lint exit code: $exit_code"
          cat artifacts/evidence-lint/output.log
          exit 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore MathLearning.slnx

      - name: Release build
        run: dotnet build MathLearning.slnx -c Release --no-restore

      - name: Run complete backend test project
        run: >-
          dotnet test tests/MathLearning.Tests/MathLearning.Tests.csproj
          -c Release --no-build
          --logger "trx;LogFileName=mathlearning-tests.trx"
          --results-directory artifacts/test-results

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failing-test-repair-final-validation
          path: artifacts
          if-no-files-found: error
          retention-days: 3
