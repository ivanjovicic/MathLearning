    SchoolLeaderboardDetailDto:
      type: object
      properties:
        period: { type: string }
        periodStartUtc: { type: string, format: date-time, nullable: true }
        school:
          $ref: '#/components/schemas/SchoolLeaderboardItemDto'
        nearbySchools:
          type: array
          items:
            $ref: '#/components/schemas/SchoolLeaderboardItemDto'
        generatedAtUtc: { type: string, format: date-time }

    SchoolLeaderboardHistoryPointDto:
      type: object
      properties:
        snapshotTimeUtc: { type: string, format: date-time }
        rank: { type: integer }
        score: { type: integer }
        activeStudents: { type: integer }
        participationRate: { type: number }
        compositeScore: { type: number }

    SchoolLeaderboardHistoryResponseDto:
      type: object
      properties:
        schoolId: { type: integer }
        period: { type: string }
        periodStartUtc: { type: string, format: date-time, nullable: true }
        points:
          type: array
          items:
            $ref: '#/components/schemas/SchoolLeaderboardHistoryPointDto'

    # Practice
    PracticeQuestionOptionDto:
      type: object
      properties:
        id: { type: integer }
        text: { type: string }
        textFormat: { type: string }
        renderMode: { type: string }
        semanticsAltText: { type: string, nullable: true }

    PracticeQuestionDto:
      type: object
      properties:
        id: { type: integer }
        prompt: { type: string }
        options:
          type: array
          items:
            $ref: '#/components/schemas/PracticeQuestionOptionDto'
        difficulty: { type: string }
        promptFormat: { type: string }
        renderMode: { type: string }
        semanticsAltText: { type: string, nullable: true }

    StartPracticeSessionRequest:
      type: object
      properties:
        userId: { type: string, nullable: true }
        skillNodeId: { type: string, nullable: true }
        topicId: { type: integer, nullable: true }
        subtopicId: { type: integer, nullable: true }
        targetQuestions: { type: integer, nullable: true }
        preferredDifficulty: { type: string, nullable: true }

    StartPracticeSessionResponse:
      type: object
      properties:
        sessionId: { type: string, format: uuid }
        skillNodeId: { type: string, nullable: true }
        recommendedDifficulty: { type: string }
        initialMastery: { type: number }
        question:
          $ref: '#/components/schemas/PracticeQuestionDto'

    SubmitPracticeAnswerRequest:
      type: object
      properties:
        questionId: { type: integer }
        selectedOption: { type: string }
        timeSpentMs: { type: integer }
      required: [questionId, selectedOption, timeSpentMs]

    SubmitPracticeAnswerResponse:
      type: object
      properties:
        isCorrect: { type: boolean }
        feedback: { type: string }
        masteryBefore: { type: number }
        masteryAfter: { type: number }
        xpEarned: { type: integer }
        nextQuestion:
          $ref: '#/components/schemas/PracticeQuestionDto'

    CompletePracticeSessionResponse:
      type: object
      properties:
        sessionId: { type: string, format: uuid }
        status: { type: string }
        answeredQuestions: { type: integer }
        correctAnswers: { type: integer }
        accuracy: { type: number }
        xpEarned: { type: integer }
        initialMastery: { type: number }
        finalMastery: { type: number }
        masteryDelta: { type: number }
        weakTopicsUpdated: { type: boolean }
        recommendedNextSkillNodeId: { type: string, nullable: true }

    # Progress
    ProgressOverviewDto:
      type: object
      properties:
        totalAnswered: { type: integer }
        accuracy: { type: number }
        dailyStreak: { type: integer }
        streakFreezeCount: { type: integer }
        lastStreakDay: { type: string, nullable: true }
        lastActivityDay: { type: string, nullable: true }
        streakEvent:
          type: object

    StreakRollEventDto:
      type: object
      properties:
        type: { type: string }
        missedDays: { type: integer }
        freezesUsed: { type: integer }
        streakBefore: { type: integer }
        streakAfter: { type: integer }

    WeakAreaDto:
      type: object
      properties:
        subtopicId: { type: integer }
        subtopicName: { type: string }
        accuracy: { type: number }

    TopicProgressDto:
      type: object
      properties:
        topicId: { type: integer }
        name: { type: string }
        accuracy: { type: number }
        unlocked: { type: boolean }

    # Question authoring (selected)
    QuestionAuthoringOptionDto:
      type: object
      properties:
        id: { type: integer, nullable: true }
        text: { type: string }
        isCorrect: { type: boolean }
        textFormat: { type: string }
        renderMode: { type: string }
        semanticsAltText: { type: string, nullable: true }

    QuestionHintDto:
      type: object
      properties:
        key: { type: string }
        text: { type: string }
        semanticsAltText: { type: string, nullable: true }

    StepExplanationAuthoringDto:
      type: object
      properties:
        order: { type: integer }
        text: { type: string }
        hint: { type: string, nullable: true }
        highlight: { type: boolean }
        textFormat: { type: string }
        hintFormat: { type: string }
        textRenderMode: { type: string }
        hintRenderMode: { type: string }
        semanticsAltText: { type: string, nullable: true }

    QuestionAuthoringRequest:
      type: object
      properties:
        questionId: { type: integer, nullable: true }
        text: { type: string }
        type: { type: string }
        correctAnswer: { type: string, nullable: true }
        explanation: { type: string, nullable: true }
        difficulty: { type: integer }
        categoryId: { type: integer }
        subtopicId: { type: integer }
        options:
          type: array
          items:
            $ref: '#/components/schemas/QuestionAuthoringOptionDto'
        hints:
          type: array
          items:
            $ref: '#/components/schemas/QuestionHintDto'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/StepExplanationAuthoringDto'
        changeReason: { type: string, nullable: true }
        requireSteps: { type: boolean }
        textFormat: { type: string }
        explanationFormat: { type: string }
        hintFormat: { type: string }
        textRenderMode: { type: string }
        explanationRenderMode: { type: string }
        hintRenderMode: { type: string }
        semanticsAltText: { type: string, nullable: true }
        correctOptionId: { type: integer, nullable: true }

    ValidationIssueDto:
      type: object
      properties:
        stage: { type: string }
        severity: { type: string }
        ruleId: { type: string }
        message: { type: string }
        fieldPath: { type: string, nullable: true }
        suggestion: { type: string, nullable: true }

    ContentLintResultDto:
      type: object
      properties:
        isValid: { type: boolean }
        issues:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssueDto'

    LatexValidationDetailDto:
      type: object
      properties:
        fieldPath: { type: string }
        isValid: { type: boolean }
        normalizedExpression: { type: string, nullable: true }
        errorCode: { type: string, nullable: true }
        errorMessage: { type: string, nullable: true }
        safeFallbackText: { type: string, nullable: true }

    LatexValidationResultDto:
      type: object
      properties:
        isValid: { type: boolean }
        fields:
          type: array
          items:
            $ref: '#/components/schemas/LatexValidationDetailDto'

    ContentSegmentDto:
      type: object
      properties:
        kind: { type: string }
        value: { type: string }

    NormalizedContentFieldDto:
      type: object
      properties:
        fieldPath: { type: string }
        rawValue: { type: string }
        normalizedValue: { type: string }
        segments:
          type: array
          items:
            $ref: '#/components/schemas/ContentSegmentDto'

    QuestionNormalizationResultDto:
      type: object
      properties:
        isSafe: { type: boolean }
        fields:
          type: array
          items:
            $ref: '#/components/schemas/NormalizedContentFieldDto'

    MathExpressionValidationResultDto:
      type: object
      properties:
        isValid: { type: boolean }
        expression: { type: string }
        normalizedExpression: { type: string, nullable: true }
        errorCode: { type: string, nullable: true }
        errorMessage: { type: string, nullable: true }

    EquivalentAnswerResultDto:
      type: object
      properties:
        isEquivalent: { type: boolean }
        expected: { type: string }
        actual: { type: string }
        comparisonMode: { type: string }
        reason: { type: string, nullable: true }

    StepValidationResultDto:
      type: object
      properties:
        order: { type: integer }
        isValid: { type: boolean }
        followsPrevious: { type: boolean }
        issues:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssueDto'

    DifficultyEstimateResultDto:
      type: object
      properties:
        score: { type: integer }
        band: { type: string }
        signals:
          type: array
          items: { type: string }

    QuestionValidationSummaryDto:
      type: object
      properties:
        canPublish: { type: boolean }
        status: { type: string }
        errorCount: { type: integer }
        warningCount: { type: integer }
        issues:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssueDto'

    QuestionPreviewPayloadDto:
      type: object
      properties:
        raw:
          $ref: '#/components/schemas/QuestionAuthoringRequest'
        normalized:
          $ref: '#/components/schemas/QuestionNormalizationResultDto'
        latex:
          $ref: '#/components/schemas/LatexValidationResultDto'
        lint:
          $ref: '#/components/schemas/ContentLintResultDto'
        equivalenceChecks:
          type: array
          items:
            $ref: '#/components/schemas/EquivalentAnswerResultDto'
        stepResults:
          type: array
          items:
            $ref: '#/components/schemas/StepValidationResultDto'
        difficulty:
          $ref: '#/components/schemas/DifficultyEstimateResultDto'
        summary:
          $ref: '#/components/schemas/QuestionValidationSummaryDto'
        safePreviewFields:
          type: object
          additionalProperties: { type: string, nullable: true }

    ValidateQuestionResponse:
      type: object
      properties:
        summary:
          $ref: '#/components/schemas/QuestionValidationSummaryDto'
        lint:
          $ref: '#/components/schemas/ContentLintResultDto'
        latex:
          $ref: '#/components/schemas/LatexValidationResultDto'
        normalized:
          $ref: '#/components/schemas/QuestionNormalizationResultDto'
        equivalenceChecks:
          type: array
          items:
            $ref: '#/components/schemas/EquivalentAnswerResultDto'
        stepResults:
          type: array
          items:
            $ref: '#/components/schemas/StepValidationResultDto'
        difficulty:
          $ref: '#/components/schemas/DifficultyEstimateResultDto'

    PreviewQuestionResponse:
      type: object
      properties:
        preview:
          $ref: '#/components/schemas/QuestionPreviewPayloadDto'

    SaveQuestionDraftRequest:
      type: object
      properties:
        content:
          $ref: '#/components/schemas/QuestionAuthoringRequest'
        changeReason: { type: string, nullable: true }

    SaveQuestionDraftResponse:
      type: object
      properties:
        draftId: { type: string, format: uuid }
        draftVersion: { type: integer }
        publishState: { type: string }
        validation:
          $ref: '#/components/schemas/ValidateQuestionResponse'

    PublishQuestionRequest:
      type: object
      properties:
        draftId: { type: string, format: uuid }
        changeReason: { type: string, nullable: true }

    PublishQuestionResponse:
      type: object
      properties:
        published: { type: boolean }
        questionId: { type: integer }
        versionId: { type: integer }
        versionNumber: { type: integer }
        publishState: { type: string }
        validationSummary:
          $ref: '#/components/schemas/QuestionValidationSummaryDto'

    QuestionVersionHistoryItemDto:
      type: object
      properties:
        versionId: { type: integer }
        versionNumber: { type: integer }
        publishState: { type: string }
        authorUserId: { type: string, nullable: true }
        editorUserId: { type: string, nullable: true }
        changeReason: { type: string, nullable: true }
        createdAtUtc: { type: string, format: date-time }
        publishedAtUtc: { type: string, format: date-time, nullable: true }
        previousVersionId: { type: integer, nullable: true }

    QuestionValidationHistoryDto:
      type: object
      properties:
        validationResultId: { type: string, format: uuid }
        draftId: { type: string, format: uuid }
        status: { type: string }
        hasErrors: { type: boolean }
        hasWarnings: { type: boolean }
        issueCount: { type: integer }
        validatedAtUtc: { type: string, format: date-time }
        issues:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssueDto'

    # Quiz extras
    NextQuestionRequest:
      type: object
      properties:
        quizId: { type: string, format: uuid }
        lastQuestionId: { type: integer }

    NextQuestionResponse:
      type: object
      properties:
        question:
          $ref: '#/components/schemas/QuestionDto'

    OfflineBatchSubmitRequest:
      type: object
      properties:
        answers:
          type: array
          items: { type: object }

    OfflineBatchSubmitResponse:
      type: object
      properties:
        attempted: { type: integer }
        succeeded: { type: integer }
        failed: { type: integer }

    StepExplanationDto:
      type: object
      properties:
        text: { type: string }
        hint: { type: string, nullable: true }

    SrsUpdateDto:
      type: object
      properties:
        questionId: { type: integer }
        newIntervalDays: { type: integer }

    # Sync: add a few detailed types
    SyncResponseDto:
      type: object
      properties:
        acknowledgedOperations:
          type: array
          items:
            type: object
        serverOperations:
          type: array
          items:
            type: object
        newCheckpoint: { type: integer }
        recommendedBackoffSeconds: { type: integer }

    SyncServerEventDto:
      type: object
      properties:
        id: { type: integer }
        eventType: { type: string }
        aggregateType: { type: string }
        aggregateId: { type: string }
        sourceOperationId: { type: string, format: uuid, nullable: true }
        payload: { type: object }
        createdAtUtc: { type: string, format: date-time }

    SyncOperationDto:
      type: object
      properties:
        operationId: { type: string, format: uuid }
        deviceId: { type: string }
        userId: { type: string }
        clientSequence: { type: integer }
        operationType: { type: string }
        occurredAtUtc: { type: string, format: date-time }
        payload: { type: object }
        signature: { type: string, nullable: true }

    # Coins
    CoinsBalanceDto:
      type: object
      properties:
        coins: { type: integer }
        totalEarned: { type: integer }
        totalSpent: { type: integer }
        level: { type: integer }
        xp: { type: integer }
        streak: { type: integer }

    CoinsTransactionDto:
      type: object
      properties:
        id: { type: string, format: uuid }
        amount: { type: integer }
        reason: { type: string }
        createdAt: { type: string, format: date-time }

    CoinsHistoryResponse:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/CoinsTransactionDto'

    # Users
    UpdateProfileRequest:
      type: object
      properties:
        displayName: { type: string, nullable: true }

    UsersProfileDto:
      type: object
      properties:
        userId: { type: string }
        username: { type: string }
        displayName: { type: string, nullable: true }
        coins: { type: integer }
        level: { type: integer }
        xp: { type: integer }
        streak: { type: integer }
        createdAt: { type: string, format: date-time }
        schoolName: { type: string, nullable: true }
        facultyName: { type: string, nullable: true }
        avatarUrl: { type: string, nullable: true }
        appearance:
          $ref: '#/components/schemas/AvatarAppearanceDto'

    # Core leaderboard DTOs
    LeaderboardEntryCoreDto:
      type: object
      properties:
        rank: { type: integer }
        userId: { type: string }
        displayName: { type: string }
        level: { type: integer }
        xp: { type: integer }
        weeklyXp: { type: integer }
        streak: { type: integer }

    LeaderboardRequestDto:
      type: object
      properties:
        scope: { type: string }
        period: { type: string }
        limit: { type: integer }
        cursor: { type: string, nullable: true }
        userId: { type: string, nullable: true }
        schoolId: { type: integer, nullable: true }
        facultyId: { type: integer, nullable: true }
        friendIds:
          type: array
          items: { type: string }


paths:
  /auth/login:
    post:
      tags: [Authentication]
      summary: Login (username/password)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: TokenResponse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Unauthorized

  /auth/mobile/register:
    post:
      tags: [Authentication]
      summary: Mobile registration
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileRegisterRequest'
      responses:
        '200':
          description: MobileRegisterResponse (Token + Profile)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: TokenResponse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Revoke a refresh token (logout)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeTokenRequest'
      responses:
        '200':
          description: Logged out

  /api/health/ready:
    get:
      tags: [Health]
      summary: Readiness including schema and counts
      security: []
      responses:
        '200':
          description: Ready summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthReadyResponse'

  /api/users/profile:
    get:
      tags: [Users]
      summary: Get current user's profile
      responses:
        '200':
          description: UserProfileDto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileDto'
    put:
      tags: [Users]
      summary: Update current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName: { type: string }
      responses:
        '200':
          description: Updated UserProfileDto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileDto'

  /api/users/stats:
    get:
      tags: [Users]
      summary: Get user's profile + stats
      responses:
        '200':
          description: profile + stats

  /api/questions:
    get:
      tags: [Questions]
      summary: List questions
      parameters:
        - name: lang
          in: query
          schema: { type: string }
        - name: subtopicId
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Array of QuestionDto
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QuestionDto'

  /api/questions/{id}:
    get:
      tags: [Questions]
      summary: Get single question
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: QuestionDto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionDto'
        '404':
          description: Not found

  /api/quiz/start:
    post:
      tags: [Quiz]
      summary: Start a quiz session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartQuizRequest'
      responses:
        '200':
          description: QuizResponse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizResponse'

  /api/quiz/answer:
    post:
      tags: [Quiz]
      summary: Submit an answer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAnswerRequest'
      responses:
        '200':
          description: SubmitAnswerResponse
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitAnswerResponse'

  /api/sync:
    post:
      tags: [Sync]
      summary: Sync client payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncRequestDto'
      responses:
        '200':
          description: SyncResponseDto (implementation-defined)

  /api/devices/register:
    post:
      tags: [Sync]
      summary: Register sync device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterSyncDeviceRequest'
      responses:
        '200':
          description: Device registration info

  /api/offline/bundle:
