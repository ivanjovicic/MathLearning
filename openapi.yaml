openapi: 3.0.3
info:
  title: MathLearning API (partial)
  version: "1.0.0"
  description: >-
    Partial OpenAPI 3.0 spec generated from the project's endpoint mappings
    (extracted 2026-05-04). This is not exhaustive — verify types and add
    missing paths/schemas as needed.
  contact:
    name: MathLearning Dev
    email: dev@mathlearning.example.com
servers:
  - url: http://localhost:5180
    description: Development server (local)

# Require Bearer JWT by default; anonymous endpoints override with security: []
security:
  - bearerAuth: []

tags:
  - name: Adaptive
    description: Adaptive learning endpoints
  - name: Analytics
    description: Analytics and recommendations
  - name: Authentication
    description: Authentication and token endpoints
  - name: Cosmetics
    description: Avatar, cosmetics catalog and store
  - name: Bugs
    description: Bug reporting and admin review
  - name: Coins
    description: Coins, transactions and ledger
  - name: Monitoring
    description: Health and monitoring endpoints
  - name: Hints
    description: Hint retrieval and purchases
  - name: Leaderboard
    description: Leaderboard and school rankings
  - name: Maintenance
    description: Admin maintenance actions
  - name: Powerups
    description: Powerups and purchases
  - name: Practice
    description: Practice sessions and submissions
  - name: Progress
    description: Progress, weak areas and analytics
  - name: QuestionAuthoring
    description: Question authoring and preview APIs
  - name: Quiz
    description: Quiz endpoints and SRS
  - name: Sync
    description: Sync, devices and offline bundles
  - name: Users
    description: User profiles, settings and avatars
  - name: Explanations
    description: Explanation generation and analysis
  - name: Health
    description: Health and readiness checks
  - name: Questions
    description: Questions retrieval and details

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
        userId:
          type: string
        username:
          type: string

    MobileRegisterRequest:
      type: object
      properties:
        username: { type: string }
        email: { type: string, format: email }
        password: { type: string }
        displayName: { type: string }
      required: [username, email, password]

    TokenRequest:
      type: object
      properties:
        refreshToken: { type: string }
      required: [refreshToken]

    RevokeTokenRequest:
      type: object
      properties:
        refreshToken: { type: string }
      required: [refreshToken]

    UserProfileDto:
      type: object
      properties:
        userId: { type: string }
        username: { type: string }
        displayName: { type: string, nullable: true }
        coins: { type: integer }
        level: { type: integer }
        xp: { type: integer }
        streak: { type: integer }
        avatarUrl: { type: string, nullable: true }
        appearance:
          type: object
          properties:
            skinId: { type: integer, nullable: true }
            hairId: { type: integer, nullable: true }
            clothingId: { type: integer, nullable: true }

    UserSettingsDto:
      type: object
      properties:
        userId: { type: string }
        language: { type: string }
        theme: { type: string }
        hintsEnabled: { type: boolean }
        soundEnabled: { type: boolean }
        vibrationEnabled: { type: boolean }
        dailyNotificationEnabled: { type: boolean }
        dailyNotificationTime: { type: string }

    OptionDto:
      type: object
      properties:
        id: { type: integer }
        text: { type: string }
        textFormat: { type: string, nullable: true }
        renderMode: { type: string, nullable: true }
        semanticsAltText: { type: string, nullable: true }

    QuestionDto:
      type: object
      properties:
        id: { type: integer }
        type: { type: string }
        text: { type: string }
        options:
          type: array
          items:
            $ref: '#/components/schemas/OptionDto'
        correctAnswerId: { type: integer }
        difficulty: { type: integer }
        hintLight: { type: string, nullable: true }
        hintMedium: { type: string, nullable: true }
        hintFull: { type: string, nullable: true }
        explanation: { type: string, nullable: true }

    StartQuizRequest:
      type: object
      properties:
        subtopicId: { type: integer }
        questionCount: { type: integer }
      required: [subtopicId, questionCount]

    QuizResponse:
      type: object
      properties:
        quizId: { type: string, format: uuid }
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionDto'

    SubmitAnswerRequest:
      type: object
      properties:
        questionId: { type: integer }
        answer:
          oneOf:
            - type: string
            - type: integer
        timeSpentSeconds: { type: integer }
        hintUsed: { type: boolean }
        quizId: { type: string, format: uuid, nullable: true }
        sessionId: { type: string, nullable: true }
        clientId: { type: string, nullable: true }
      required: [questionId, answer]

    SubmitAnswerResponse:
      type: object
      properties:
        isCorrect: { type: boolean }
        explanation: { type: string, nullable: true }
        steps:
          type: array
          items:
            type: object
            properties:
              text: { type: string }
              hint: { type: string, nullable: true }
        isFirstTimeCorrect: { type: boolean }
        awardedXp: { type: integer }
        totalXpAfterAward: { type: integer }

    SyncRequestDto:
      type: object
      additionalProperties: true

    RegisterSyncDeviceRequest:
      type: object
      properties:
        deviceId: { type: string }
        deviceName: { type: string }
        platform: { type: string }
      required: [deviceId]

    HealthReadyResponse:
      type: object
      properties:
        status: { type: string }
        db: { type: string }
        data:
          type: object
          properties:
            questions: { type: integer }
            categories: { type: integer }
            users: { type: integer }
        schema: { type: object }
        timestamp: { type: string, format: date-time }

    ApiResult:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
        error: { type: string, nullable: true }
        errorCode: { type: string, nullable: true }
        errorDetails:
          type: object
        isRateLimited: { type: boolean }
        retryAfterSeconds: { type: integer, nullable: true }
        traceId: { type: string, nullable: true }
        timestampUtc: { type: string, format: date-time }

    # Adaptive DTOs
    AdaptiveSessionItemDto:
      type: object
      properties:
        adaptiveSessionItemId: { type: string, format: uuid }
        questionId: { type: integer }
        topicId: { type: integer }
        subtopicId: { type: integer }
        sourceType: { type: string }
        difficultyLevel: { type: string }
        sequence: { type: integer }

    AdaptiveSessionDto:
      type: object
      properties:
        adaptiveSessionId: { type: string, format: uuid }
        createdAtUtc: { type: string, format: date-time }
        expiresAtUtc: { type: string, format: date-time }
        profileDifficulty: { type: string }
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdaptiveSessionItemDto'

    AdaptivePathPayload:
      type: object
      properties:
        recommendations:
          type: array
          items: { type: object }
        dueReviews:
          type: array
          items: { type: object }
        generatedAtUtc: { type: string, format: date-time }

    AdaptivePathResponse:
      type: object
      properties:
        payload:
          $ref: '#/components/schemas/AdaptivePathPayload'
        servedFromCache: { type: boolean }
        isStale: { type: boolean }
        fallbackReason: { type: string, nullable: true }
        cachedAtUtc: { type: string, format: date-time, nullable: true }

    AdaptiveRecommendationsPayload:
      type: object
      properties:
        recommendations:
          type: array
          items: { type: object }
        generatedAtUtc: { type: string, format: date-time }

    AdaptiveRecommendationsResponse:
      type: object
      properties:
        payload:
          $ref: '#/components/schemas/AdaptiveRecommendationsPayload'
        servedFromCache: { type: boolean }
        isStale: { type: boolean }
        fallbackReason: { type: string, nullable: true }
        cachedAtUtc: { type: string, format: date-time, nullable: true }

    # Analytics DTOs
    WeakTopicDto:
      type: object
      properties:
        topicId: { type: integer }
        topicName: { type: string }
        accuracy: { type: number }
        weaknessLevel: { type: string }
        confidence: { type: number }
        weaknessScore: { type: number }
        lastAttempt: { type: string, format: date-time }
        totalQuestions: { type: integer }

    WeakSubtopicDto:
      type: object
      properties:
        subtopicId: { type: integer }
        subtopicName: { type: string }
        topicId: { type: integer }
        topicName: { type: string }
        accuracy: { type: number }
        weaknessLevel: { type: string }
        confidence: { type: number }
        weaknessScore: { type: number }
        lastAttempt: { type: string, format: date-time }
        totalQuestions: { type: integer }

    PracticeRecommendationDto:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        topicId: { type: integer }
        subtopicId: { type: integer, nullable: true }
        reason: { type: string }
        priority: { type: number }

    PracticeRecommendationsResponse:
      type: object
      properties:
        recommendations:
          type: array
          items:
            $ref: '#/components/schemas/PracticeRecommendationDto'
        page: { type: integer }
        pageSize: { type: integer }
        returned: { type: integer }

    # AntiCheat DTOs
    AntiCheatAnswerObservationInput:
      type: object
      properties:
        userId: { type: string }
        sourceType: { type: string }
        questionId: { type: integer }
        topicId: { type: integer, nullable: true }
        subtopicId: { type: integer, nullable: true }
        sessionId: { type: string, format: uuid, nullable: true }
        deviceId: { type: string, nullable: true }
        clientSequence: { type: integer, nullable: true }
        answer: { type: string, nullable: true }
        isCorrect: { type: boolean }
        responseTimeMs: { type: integer }
        confidence: { type: number, nullable: true }
        answeredAtUtc: { type: string, format: date-time }
        metadataJson: { type: string, nullable: true }

    AntiCheatMlPromptDto:
      type: object
      properties:
        promptVersion: { type: string }
        systemPrompt: { type: string }
        userPrompt: { type: string }
        payloadJson: { type: string }

    AntiCheatDetectionResultDto:
      type: object
      properties:
        isSuspicious: { type: boolean }
        riskScore: { type: integer }
        severity: { type: string }
        decision: { type: string }
        reasonSummary: { type: string }
        signals:
          type: array
          items: { type: string }
        prompt:
          $ref: '#/components/schemas/AntiCheatMlPromptDto'

    AntiCheatOverviewDto:
      type: object
      properties:
        pendingCount: { type: integer }
        highSeverityCount: { type: integer }
        criticalSeverityCount: { type: integer }
        confirmedCount: { type: integer }
        falsePositiveCount: { type: integer }
        last24HoursCount: { type: integer }
        mlQueuedCount: { type: integer }
        mlFailedCount: { type: integer }
        mlCompletedCount: { type: integer }

    AntiCheatDetectionItemDto:
      type: object
      properties:
        id: { type: string, format: uuid }
        userId: { type: string }
        sourceType: { type: string }
        questionId: { type: integer }
        topicId: { type: integer, nullable: true }
        subtopicId: { type: integer, nullable: true }
        sessionId: { type: string, format: uuid, nullable: true }
        deviceId: { type: string, nullable: true }
        clientSequence: { type: integer, nullable: true }
        answeredAtUtc: { type: string, format: date-time }
        responseTimeMs: { type: integer }
        isCorrect: { type: boolean }
        confidence: { type: number, nullable: true }
        riskScore: { type: integer }
        severity: { type: string }
        decision: { type: string }
        reasonSummary: { type: string }
        reviewStatus: { type: string }
        detectedAtUtc: { type: string, format: date-time }
        reviewedAtUtc: { type: string, format: date-time, nullable: true }
        signalsJson: { type: string }
        promptVersion: { type: string }
        mlReviewStatus: { type: string }
        mlReviewAttempts: { type: integer }
        mlModelName: { type: string, nullable: true }
        mlReviewedAtUtc: { type: string, format: date-time, nullable: true }
        mlLastError: { type: string, nullable: true }
        mlReviewOutputJson: { type: string, nullable: true }

    ReviewAntiCheatDetectionRequest:
      type: object
      properties:
        reviewStatus: { type: string }
        notes: { type: string, nullable: true }
      required: [reviewStatus]

    # Bugs
    BugReportRequest:
      type: object
      properties:
        screen: { type: string }
        description: { type: string }
        stepsToReproduce: { type: string, nullable: true }
        severity: { type: string }
        platform: { type: string }
        locale: { type: string }
        appVersion: { type: string }
        screenshotBase64: { type: string, nullable: true }
      required: [screen, description, severity, platform, locale, appVersion]

    BugReportDto:
      type: object
      properties:
        id: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
        userId: { type: string }
        usernameSnapshot: { type: string }
        screen: { type: string }
        description: { type: string }
        stepsToReproduce: { type: string, nullable: true }
        severity: { type: string }
        platform: { type: string }
        locale: { type: string }
        appVersion: { type: string }
        screenshotUrl: { type: string, nullable: true }
        status: { type: string }
        resolvedAt: { type: string, format: date-time, nullable: true }
        assignee: { type: string, nullable: true }

    UpdateBugStatusRequest:
      type: object
      properties:
        status: { type: string }
        assignee: { type: string, nullable: true }
      required: [status]

    BugReportsResponse:
      type: object
      properties:
        bugs:
          type: array
          items:
            $ref: '#/components/schemas/BugReportDto'
        totalCount: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }

    # Cosmetics
    CosmeticCatalogItemDto:
      type: object
      properties:
        id: { type: integer }
        key: { type: string }
        name: { type: string }
        category: { type: string }
        rarity: { type: string }
        assetPath: { type: string }
        previewAssetPath: { type: string, nullable: true }
        unlockType: { type: string }
        unlockCondition: { type: string, nullable: true }
        unlockConditionJson: { type: string, nullable: true }
        coinPrice: { type: integer, nullable: true }
        seasonId: { type: integer, nullable: true }
        isDefault: { type: boolean }
        isOwned: { type: boolean }
        isEquipped: { type: boolean }
        isActive: { type: boolean }
        isHidden: { type: boolean }
        assetVersion: { type: string }

    CosmeticCatalogResponseDto:
      type: object
      properties:
        catalogVersion: { type: string }
        items:
          type: array
          items:
            $ref: '#/components/schemas/CosmeticCatalogItemDto'

    InventoryItemDto:
      type: object
      properties:
        cosmeticItemId: { type: integer }
        key: { type: string }
        name: { type: string }
        category: { type: string }
        rarity: { type: string }
        assetPath: { type: string }
        previewAssetPath: { type: string, nullable: true }
        source: { type: string }
        sourceRef: { type: string, nullable: true }
        grantReason: { type: string, nullable: true }
        unlockedAt: { type: string, format: date-time }
        isEquipped: { type: boolean }
        isRevoked: { type: boolean }

    CosmeticInventoryResponseDto:
      type: object
      properties:
        userId: { type: string }
        ownedCount: { type: integer }
        items:
          type: array
          items:
            $ref: '#/components/schemas/InventoryItemDto'
        equipped:
          $ref: '#/components/schemas/AvatarConfigDto'

    AvatarConfigDto:
      type: object
      properties:
        skinId: { type: integer, nullable: true }
        hairId: { type: integer, nullable: true }
        clothingId: { type: integer, nullable: true }
        accessoryId: { type: integer, nullable: true }
        emojiId: { type: integer, nullable: true }
        frameId: { type: integer, nullable: true }
        backgroundId: { type: integer, nullable: true }
        effectId: { type: integer, nullable: true }
        leaderboardDecorationId: { type: integer, nullable: true }
        version: { type: integer }

    AvatarAppearanceDto:
      type: object
      properties:
        equipped:
          $ref: '#/components/schemas/AvatarConfigDto'
        skinAsset: { type: string, nullable: true }
        hairAsset: { type: string, nullable: true }
        clothingAsset: { type: string, nullable: true }
        accessoryAsset: { type: string, nullable: true }
        emojiAsset: { type: string, nullable: true }
        frameAsset: { type: string, nullable: true }
        backgroundAsset: { type: string, nullable: true }
        effectAsset: { type: string, nullable: true }
        leaderboardDecorationAsset: { type: string, nullable: true }

    UpdateAvatarConfigRequest:
      type: object
      properties:
        skinId: { type: integer, nullable: true }
        hairId: { type: integer, nullable: true }
        clothingId: { type: integer, nullable: true }
        accessoryId: { type: integer, nullable: true }
        emojiId: { type: integer, nullable: true }
        frameId: { type: integer, nullable: true }
        backgroundId: { type: integer, nullable: true }
        effectId: { type: integer, nullable: true }
        leaderboardDecorationId: { type: integer, nullable: true }

    EquipCosmeticRequest:
      type: object
      properties:
        slot: { type: string }
        cosmeticItemId: { type: integer, nullable: true }

    EquipCosmeticBatchChangeDto:
      type: object
      properties:
        slot: { type: string }
        cosmeticItemId: { type: integer, nullable: true }

    EquipCosmeticBatchRequest:
      type: object
      properties:
        changes:
          type: array
          items:
            $ref: '#/components/schemas/EquipCosmeticBatchChangeDto'

    PurchaseCosmeticRequest:
      type: object
      properties:
        cosmeticItemId: { type: integer }
      required: [cosmeticItemId]

    PurchaseCosmeticResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        remainingCoins: { type: integer }

    CosmeticSeasonDto:
      type: object
      properties:
        id: { type: integer }
        key: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        theme: { type: string, nullable: true }
        themeAssetPath: { type: string, nullable: true }
        status: { type: string }
        startDate: { type: string, format: date-time }
        endDate: { type: string, format: date-time }
        isActive: { type: boolean }
        itemCount: { type: integer }

    RewardTrackTierDto:
      type: object
      properties:
        id: { type: integer }
        tier: { type: integer }
        xpRequired: { type: integer }
        trackType: { type: string }
        rewardType: { type: string }
        rewardPayloadJson: { type: string }
        isUnlocked: { type: boolean }
        isClaimed: { type: boolean }
        canClaim: { type: boolean }

    RewardTrackResponseDto:
      type: object
      properties:
        seasonId: { type: integer }
        trackType: { type: string }
        currentXp: { type: integer }
        currentTier: { type: integer }
        claimableTierCount: { type: integer }
        tiers:
          type: array
          items:
            $ref: '#/components/schemas/RewardTrackTierDto'

    CosmeticUnlockResultDto:
      type: object
      properties:
        cosmeticItemId: { type: integer }
        key: { type: string }
        name: { type: string }
        category: { type: string }
        rarity: { type: string }
        sourceType: { type: string }
        sourceRef: { type: string }
        unlockedAtUtc: { type: string, format: date-time }

    CosmeticRewardSourceRequest:
      type: object
      properties:
        userId: { type: string }
        sourceType: { type: string }
        sourceRef: { type: string }
        payloadJson: { type: string, nullable: true }

    ClaimRewardTrackTierRequest:
      type: object
      properties:
        seasonId: { type: integer, nullable: true }
        trackType: { type: string }
        tier: { type: integer }
      required: [trackType, tier]

    ClaimRewardTrackTierResponse:
      type: object
      properties:
        success: { type: boolean }
        alreadyClaimed: { type: boolean }
        seasonId: { type: integer }
        trackType: { type: string }
        tier: { type: integer }
        rewards:
          type: array
          items:
            $ref: '#/components/schemas/CosmeticUnlockResultDto'

    CosmeticAnalyticsSummaryDto:
      type: object
      properties:
        totalOwnedItems: { type: integer }
        activeCustomizedUsers: { type: integer }
        unlockEvents7d: { type: integer }
        equipEvents7d: { type: integer }
        purchaseEvents7d: { type: integer }
        unlocksBySource:
          type: object
          additionalProperties: { type: integer }
        equipByCategory:
          type: object
          additionalProperties: { type: integer }

    # Explanations
    GenerateExplanationRequest:
      type: object
      properties:
        problemId: { type: integer, nullable: true }
        problemText: { type: string, nullable: true }
        studentAnswer: { type: string, nullable: true }
        expectedAnswer: { type: string, nullable: true }
        topic: { type: string, nullable: true }
        subtopic: { type: string, nullable: true }
        grade: { type: integer }
        difficulty: { type: string }
        language: { type: string }
        enableAiTutorEnhancement: { type: boolean }
        forceRefresh: { type: boolean }

    MistakeAnalysisRequest:
      type: object
      properties:
        problemId: { type: integer, nullable: true }
        problemText: { type: string, nullable: true }
        studentAnswer: { type: string }
        expectedAnswer: { type: string, nullable: true }
        topic: { type: string, nullable: true }
        subtopic: { type: string, nullable: true }
        grade: { type: integer }
        difficulty: { type: string }
        language: { type: string }
        forceRefresh: { type: boolean }
      required: [studentAnswer, grade, difficulty, language]

    HintDto:
      type: object
      properties:
        text: { type: string }
        hintType: { type: string }
        revealOrder: { type: integer }

    MathContextDto:
      type: object
      properties:
        topic: { type: string }
        subtopic: { type: string }
        grade: { type: integer }
        difficulty: { type: string }
        commonMistakeType: { type: string }

    StepExplanationItemDto:
      type: object
      properties:
        id: { type: string, format: uuid }
        order: { type: integer }
        text: { type: string }
        stepType: { type: string }
        explanationType: { type: string }
        highlight: { type: boolean }
        hint:
          $ref: '#/components/schemas/HintDto'
        latexExpression: { type: string, nullable: true }
        mathMlExpression: { type: string, nullable: true }
        formulaReferenceId: { type: string, nullable: true }
        difficulty: { type: string }
        context:
          $ref: '#/components/schemas/MathContextDto'
        imageUrl: { type: string, nullable: true }

    FormulaReferenceDto:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        latex: { type: string }
        mathMl: { type: string }
        description: { type: string }

    MistakeInsightDto:
      type: object
      properties:
        mistakeType: { type: string }
        description: { type: string }
        remediation: { type: string }
        confidence: { type: number }
        formulaReferenceId: { type: string, nullable: true }

    ExplanationResponseDto:
      type: object
      properties:
        problemId: { type: integer, nullable: true }
        problemText: { type: string }
        problemHash: { type: string }
        language: { type: string }
        servedFromCache: { type: boolean }
        steps:
          type: array
          items:
            $ref: '#/components/schemas/StepExplanationItemDto'
        formulaReferences:
          type: array
          items:
            $ref: '#/components/schemas/FormulaReferenceDto'
        mistakes:
          type: array
          items:
            $ref: '#/components/schemas/MistakeInsightDto'

    MistakeAnalysisResponseDto:
      type: object
      properties:
        problemId: { type: integer, nullable: true }
        problemText: { type: string }
        problemHash: { type: string }
        servedFromCache: { type: boolean }
        mistakes:
          type: array
          items:
            $ref: '#/components/schemas/MistakeInsightDto'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/StepExplanationItemDto'
        formulaReferences:
          type: array
          items:
            $ref: '#/components/schemas/FormulaReferenceDto'

    MathProblemDescriptor:
      type: object
      properties:
        problemId: { type: integer, nullable: true }
        problemText: { type: string }
        expectedAnswer: { type: string, nullable: true }
        studentAnswer: { type: string, nullable: true }
        context:
          type: object
        language: { type: string }

    # Leaderboard
    LeaderboardItemDto:
      type: object
      properties:
        rank: { type: integer }
        userId: { type: string }
        displayName: { type: string }
        avatarUrl: { type: string, nullable: true }
        appearance:
          $ref: '#/components/schemas/AvatarAppearanceDto'
        score: { type: integer }
        streakDays: { type: integer }
        level: { type: integer }

    LeaderboardContextDto:
      type: object
      properties:
        schoolId: { type: integer, nullable: true }
        schoolName: { type: string, nullable: true }
        facultyId: { type: integer, nullable: true }
        facultyName: { type: string, nullable: true }

    LeaderboardMeDto:
      type: object
      properties:
        rank: { type: integer }
        score: { type: integer }
        percentile: { type: integer }
        badges:
          type: array
          items: { type: string }

    LeaderboardResponseDto:
      type: object
      properties:
        scope: { type: string }
        period: { type: string }
        context:
          $ref: '#/components/schemas/LeaderboardContextDto'
        items:
          type: array
          items:
            $ref: '#/components/schemas/LeaderboardItemDto'
        me:
          $ref: '#/components/schemas/LeaderboardMeDto'
        nextCursor: { type: string, nullable: true }

    SchoolLeaderboardItemDto:
      type: object
      properties:
        rank: { type: integer }
        schoolId: { type: integer }
        schoolName: { type: string }
        score: { type: integer }
        members: { type: integer }
        rankingScore: { type: number, nullable: true }
        activeStudents: { type: integer, nullable: true }
        eligibleStudents: { type: integer, nullable: true }
        participationRate: { type: number, nullable: true }
        averageXpPerActiveStudent: { type: number, nullable: true }
        updatedAtUtc: { type: string, format: date-time, nullable: true }

    SchoolLeaderboardResponseDto:
      type: object
      properties:
        period: { type: string }
        items:
          type: array
          items:
            $ref: '#/components/schemas/SchoolLeaderboardItemDto'
        mySchool:
          $ref: '#/components/schemas/SchoolLeaderboardItemDto'
        nextCursor: { type: string, nullable: true }
        rankingMetric: { type: string }
        periodStartUtc: { type: string, format: date-time, nullable: true }
        generatedAtUtc: { type: string, format: date-time }
