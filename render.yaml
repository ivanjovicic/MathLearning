services:
  - type: web
    name: mathlearning-admin
    runtime: docker
    branch: main
    dockerfilePath: ./src/MathLearning.Admin/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    disk:
      name: admin-keys
      mountPath: /app/keys
      sizeGB: 1
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ApiBaseUrl
        value: https://mathlearning-sn6d.onrender.com/
      - key: Database__InitializeOnStartup
        value: "true"
      - key: SeedAdmin__Enabled
        value: "false"
      - key: SeedAdmin__ResetPasswordOnStart
        value: "false"
      - key: SeedContent__Enabled
        value: "false"
      - key: ConnectionStrings__AdminIdentity
        sync: false
  - type: web
    name: mathlearning-api
    runtime: docker
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__Default
        sync: false
